name: "Cook_Lavender_A10"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip rclone

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          
          # Ép ghi đúng định dạng cấu hình rclone chuẩn
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          token = ${{ secrets.RCLONE_CONFIG_TOKEN }}
          EOF
          
          # Thêm sudo để tạo thư mục hệ thống
          sudo mkdir -p /mnt/gdrive
          sudo chown $(whoami):$(whoami) /mnt/gdrive

      - name: Mount Google Drive
        run: |
          rclone mount gdrive: /mnt/gdrive --daemon --allow-other --vfs-cache-mode writes
          sleep 5 # Chờ mount xong

      - name: Repo Init & Sync
        run: |
          # 1. Tạo thư mục bin cục bộ và tải công cụ repo từ Google
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          
          # 2. Thêm ~/bin vào biến môi trường PATH để hệ thống nhận diện được lệnh "repo"
          export PATH=~/bin:$PATH
          
          # 3. Cấu hình danh tính Git cơ bản (Bắt buộc phải có để repo init không bị lỗi)
          git config --global user.name "Neonova Solara"
          git config --global user.email "vinhhpn178@gmail.com"

          # 4. Tạo thư mục làm việc trên Google Drive đã mount
          mkdir -p /mnt/gdrive/android10
          cd /mnt/gdrive/android10
          
          # 5. Tiến hành khởi tạo Manifest và Sync code
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --git-lfs
          
          # Tạo local_manifests để chuẩn bị kéo tree cho Lavender
          mkdir -p .repo/local_manifests
          
          # Bắt đầu kéo source code về thẳng Drive
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Build ROM
        run: |
          cd /mnt/gdrive/android10
          source build/envsetup.sh
          lunch lineage_lavender-user
          mka bacon
