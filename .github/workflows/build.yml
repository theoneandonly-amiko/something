name: "Cook_Lavender_A10"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Dọn dẹp tối đa ổ cứng máy ảo
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Cài đặt công cụ và cấu hình rclone (Không mount đĩa ảo nữa)
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip rclone
          
          # Cấu hình rclone dạng API thông thường
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          token = ${{ secrets.RCLONE_CONFIG_TOKEN }}
          EOF

      - name: Repo Init & Sync trực tiếp trên SSD máy ảo
        run: |
          # Cài công cụ repo
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH
          
          git config --global user.name "Neonova Solara"
          git config --global user.email "vinhhpn178@gmail.com"
          # Ép Git luôn tự động đồng ý, không bật trình terminal hỏi han
          git config --global core.pager cat

          mkdir -p ~/android10
          cd ~/android10
          
          # THAY ĐỔI: Thêm flag --no-clone-bundle và --no-tags ngay từ bước init, cấm hỏi cung bằng --no-repo-verify
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --no-repo-verify --depth=1
          
          # THAY ĐỔI: Thêm các tham số ép chạy ngầm hoàn toàn, tự động bỏ qua các prompt xác nhận
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags --no-manifest-update --optimized-fetch

      - name: Đóng gói và Đẩy ngược source code lên Google Drive Pro
        if: always() # Dù bước trên có bị quá giờ hay lỗi thì vẫn đẩy đống code đã tải được lên Drive để lưu trữ
        run: |
          cd ~
          echo "Đang nén đống source code lại thành 1 file để up cho lẹ..."
          tar -czf android10_source.tar.gz android10
          
          echo "Đang đẩy file lên Google Drive Pro..."
          rclone copy android10_source.tar.gz gdrive:/ -P
