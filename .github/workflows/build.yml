name: "Cook_Lavender_A10"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip rclone

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          
          # Ép ghi đúng định dạng cấu hình rclone chuẩn
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          token = ${{ secrets.RCLONE_CONFIG_TOKEN }}
          EOF
          
          # Thêm sudo để tạo thư mục hệ thống
          sudo mkdir -p /mnt/gdrive
          sudo chown $(whoami):$(whoami) /mnt/gdrive

      - name: Mount Google Drive
        run: |
          # Thêm các tham số tối ưu cache chuyên dụng cho việc ghi lượng lớn file nhỏ
          rclone mount gdrive: /mnt/gdrive --daemon --allow-other --vfs-cache-mode full --vfs-write-back 5s --buffer-size 64M
          sleep 5

      - name: Repo Init & Sync
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH
          
          git config --global user.name "Neonova Solara"
          git config --global user.email "vinhhpn178@gmail.com"

          mkdir -p /mnt/gdrive/android10
          cd /mnt/gdrive/android10
          
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --git-lfs
          mkdir -p .repo/local_manifests
          
          # THAY ĐỔI: Thêm flag --verbose và -j1 để ép in log chi tiết từng file, xem có chạy thật không
          repo sync -c -j1 --fail-fast --force-sync --no-clone-bundle --no-tags --verbose
          
      - name: Build ROM
        run: |
          cd /mnt/gdrive/android10
          source build/envsetup.sh
          lunch lineage_lavender-user
          mka bacon
