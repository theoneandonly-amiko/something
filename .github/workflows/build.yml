name: "Cook_Lavender_A10"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip rclone

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.RCLONE_CONFIG_TOKEN }}' > ~/.config/rclone/rclone.conf
          sudo mkdir -p /mnt/gdrive
          sudo chown $(whoami):$(whoami) /mnt/gdrive

      - name: Mount Google Drive
        run: |
          rclone mount gdrive: /mnt/gdrive --daemon --allow-other --vfs-cache-mode writes
          sleep 5 # Chờ mount xong

      - name: Repo Init & Sync
        run: |
          sudo mkdir -p /mnt/gdrive/android10
          cd /mnt/gdrive/android10
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1
          # Tạo local_manifests ở đây để sync tree Lavender
          mkdir -p .repo/local_manifests
          # (Bạn sẽ tạo file roomservice.xml ở đây sau)
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Build ROM
        run: |
          cd /mnt/gdrive/android10
          source build/envsetup.sh
          lunch lineage_lavender-user
          mka bacon
